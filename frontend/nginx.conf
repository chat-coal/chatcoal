server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets: serve directly, return 404 if missing (never fallback to index.html)
    location /assets/ {
        try_files $uri =404;
    }

    # SPA fallback: all other routes serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
